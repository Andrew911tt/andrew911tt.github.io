<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andrew Correnti</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      background-color: #1565c0;
      color: #ffffff;
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.25em;
    }
    p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-top: 0;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 2rem;
    }
    .links a {
      display: inline-block;
      padding: 0.75rem 2rem;
      background-color: #ffffff;
      color: #1565c0;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1.1rem;
      transition: background-color 0.15s ease, transform 0.15s ease;
    }
    .links a:hover {
      background-color: #e3f2fd;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <h1>Welcome</h1>
  <p>My links</p>
  <div class="links">
    <a href="https://radeuslabs.com">Radeus Labs</a>
    <a href="https://dl.radeuslabs.com/tools">Radeus Labs Tools</a>
  </div>
</body>
</html>
